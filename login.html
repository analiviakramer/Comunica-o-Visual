<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f0eb;
      --surface: #ffffff;
      --border: #ddd8d0;
      --text-primary: #1a1714;
      --text-secondary: #7a746b;
      --accent: #ce0090;
      --accent-hover: #a8006f;
      --btn-social-bg: #f0ebe4;
      --btn-social-hover: #e4ddd4;
      --shadow: 0 8px 40px rgba(0,0,0,0.08);
    }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      background-image: radial-gradient(circle at 20% 50%, rgba(206,0,144,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(206,0,144,0.04) 0%, transparent 40%);
    }

    .login-section {
      background: var(--surface);
      border-radius: 20px;
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .login-header p {
      margin-top: 6px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-weight: 300;
    }

    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 11px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--btn-social-bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      text-decoration: none;
    }

    .btn-social:hover {
      background: var(--btn-social-hover);
      border-color: #c8c2b8;
      transform: translateY(-1px);
    }

    .btn-social svg { flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field-group input {
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #faf8f5;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-group input::placeholder { color: #b5afa7; }

    .field-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(206,0,144,0.1);
      background: #fff;
    }

    .forgot-password {
      align-self: flex-end;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-decoration: none;
      margin-top: -6px;
      transition: color 0.2s;
    }

    .forgot-password:hover { color: var(--accent); }

    .btn-submit {
      margin-top: 6px;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn-submit:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(206,0,144,0.35);
    }

    .btn-submit:active { transform: translateY(0); }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .login-footer p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .login-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .login-footer a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <section class="login-section" aria-label="Formulário de login">

    <div class="login-header">
      <h1>Bem-vindo</h1>
      <p>Entre na sua conta para continuar</p>
    </div>

    <div class="social-buttons">
      <button class="btn-social" type="button" aria-label="Continuar com Facebook">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.413c0-3.026 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.266h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
        Continuar com Facebook
      </button>

      <button class="btn-social" type="button" aria-label="Continuar com Apple">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Continuar com Apple
      </button>

      <button class="btn-social" type="button" aria-label="Continuar com Google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar com Google
      </button>
    </div>

    <div class="divider"><span>ou</span></div>

    <div class="login-form">
      <div class="field-group">
        <label for="email">Email ou nome de usuário</label>
        <input id="email" type="text" placeholder="seu@email.com" autocomplete="username"/>
      </div>

      <div class="field-group">
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <a href="#" class="forgot-password">Esqueceu sua senha?</a>

      <button class="btn-submit" type="button">Entrar</button>
    </div>

    <div class="login-footer">
      <p>Não tem conta? <a href="#">Cadastre-se</a></p>
    </div>

  </section>

</body>
</html>
